name: 'Compile MT6000 Firmware Payload'
description: 'Executes OpenWrt sparse checkout, feed injection, build, and asset release'
inputs:
  gh_token:
    description: 'GitHub Token for release creation'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Clone OpenWrt & Checkout Specific Commit
      shell: bash
      run: |
        mkdir -p openwrt-build
        cd openwrt-build
        git init
        git remote add origin https://github.com/openwrt/openwrt.git
        git fetch --depth 1 origin d23120ca5e819612d1911def8d4d54aecfa5549e
        git checkout FETCH_HEAD

    - name: Inject pesa1234 Custom Feeds
      shell: bash
      run: |
        cd openwrt-build
        echo "src-git packages https://github.com/pesa1234/packages.git^f2077bf9cb4839271498f5786966304ab95dcfe1" > feeds.conf.default
        echo "src-git luci https://github.com/pesa1234/luci.git^eb104ef50991286931ce4854de13fb5c6e028212" >> feeds.conf.default
        echo "src-git routing https://git.openwrt.org/feed/routing.git^6ea029dcc96645836d34dbed56c05e7468916fdc" >> feeds.conf.default
        echo "src-git telephony https://git.openwrt.org/feed/telephony.git^4d8d33a023b24c52cd9443b9dc201fbdfe9c6aef" >> feeds.conf.default
        echo "src-git video https://github.com/openwrt/video.git^a951381b6c58b9b1eb087f09c9a20cff4ffe8063" >> feeds.conf.default
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply Baseline Configuration
      shell: bash
      run: |
        wget -O openwrt-build/.config "https://raw.githubusercontent.com/pesa1234/MT6000_cust_build/refs/heads/main/2026-06-20_r35920-d23120ca5e_next-r4.9.0.rss.mtk/targets/mediatek/filogic/config.buildinfo"
        cd openwrt-build
        make defconfig

    - name: Download Source Packages
      shell: bash
      run: |
        cd openwrt-build
        make download -j8

    - name: Compile Firmware
      shell: bash
      run: |
        cd openwrt-build
        make -j$(nproc) V=s

    - name: Stage Artifacts for Release
      id: stage_release
      shell: bash
      run: |
        VERSION="$(git -C openwrt-build rev-parse --short HEAD)"
        echo "VERSION=${VERSION}" >> $GITHUB_ENV
        mkdir -p release-assets
        cp openwrt-build/bin/targets/mediatek/filogic/*sysupgrade.bin release-assets/ 2>/dev/null || true
        cp openwrt-build/bin/targets/mediatek/filogic/*.manifest release-assets/ 2>/dev/null || true
        cp openwrt-build/bin/targets/mediatek/filogic/config.buildinfo release-assets/ 2>/dev/null || true

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
      shell: bash
      run: |
        gh release create "mt6000-build-${{ env.VERSION }}" \
          --title "GL-MT6000 Firmware (${{ env.VERSION }})" \
          --notes "Automated build of the MT6000 firmware stack." \
          release-assets/* || echo "Release creation completed or skipped"

    - name: Runner Housekeeping
      if: always()
      shell: bash
      run: |
        echo "Cleaning up heavy OpenWrt build directories..."
        rm -rf openwrt-build release-assets
